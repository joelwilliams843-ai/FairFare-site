apply plugin: 'com.android.application'

// Signing configuration - all values with safe defaults
def keystorePasswordValue = System.getenv("KEYSTORE_PASSWORD")
def keystoreAliasValue = System.getenv("KEY_ALIAS") ?: "fairfare-release"
def keystoreFilePath = '../fairfare-release-v2.keystore'

android {
    namespace "com.tryfairfare.app"
    compileSdk 35
    
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }
    
    defaultConfig {
        applicationId "com.tryfairfare.app"
        minSdkVersion 22
        targetSdkVersion 35
        versionCode 10
        versionName "1.0.10"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    
    signingConfigs {
        release {
            def ksFile = file(keystoreFilePath)
            if (ksFile.exists() && keystorePasswordValue != null && !keystorePasswordValue.isEmpty()) {
                storeFile ksFile
                storePassword keystorePasswordValue
                keyAlias keystoreAliasValue
                keyPassword keystorePasswordValue
            } else {
                // Fallback for local/debug builds without signing
                storeFile null
                storePassword ""
                keyAlias ""
                keyPassword ""
            }
        }
    }
    
    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            // Only apply signing config if keystore password is available
            if (keystorePasswordValue != null && !keystorePasswordValue.isEmpty()) {
                signingConfig signingConfigs.release
            }
        }
    }
    
    bundle {
        language {
            enableSplit = true
        }
        density {
            enableSplit = true
        }
        abi {
            enableSplit = true
        }
    }
}

// Force compatible version of androidx.browser
configurations.all {
    resolutionStrategy {
        force 'androidx.browser:browser:1.8.0'
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:1.6.1"
    implementation "androidx.coordinatorlayout:coordinatorlayout:1.2.0"
    implementation "androidx.core:core-splashscreen:1.0.1"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:4.13.2"
    androidTestImplementation "androidx.test.ext:junit:1.1.5"
    androidTestImplementation "androidx.test.espresso:espresso-core:3.5.1"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied.")
}
