apply plugin: 'com.android.application'

// Defensive defaults in case variables.gradle hasn't been applied
def sdkVersion = rootProject.hasProperty('ext') && rootProject.ext.has('compileSdkVersion') ? rootProject.ext.compileSdkVersion : 35
def minSdk = rootProject.hasProperty('ext') && rootProject.ext.has('minSdkVersion') ? rootProject.ext.minSdkVersion : 22
def targetSdk = rootProject.hasProperty('ext') && rootProject.ext.has('targetSdkVersion') ? rootProject.ext.targetSdkVersion : 35

android {
    namespace "com.tryfairfare.app"
    compileSdk sdkVersion
    
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }
    
    defaultConfig {
        applicationId "com.tryfairfare.app"
        minSdkVersion minSdk
        targetSdkVersion targetSdk
        versionCode 10
        versionName "1.0.10"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    
    signingConfigs {
        release {
            def ksPassword = System.getenv("KEYSTORE_PASSWORD")
            storeFile file('../fairfare-release-v2.keystore')
            storePassword ksPassword != null ? ksPassword : "placeholder"
            keyAlias 'fairfare-release'
            keyPassword ksPassword != null ? ksPassword : "placeholder"
        }
    }
    
    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
    }
    
    bundle {
        language {
            enableSplit = true
        }
        density {
            enableSplit = true
        }
        abi {
            enableSplit = true
        }
    }
}

// Force compatible version of androidx.browser (1.9.0 requires compileSdk 36)
configurations.all {
    resolutionStrategy {
        force 'androidx.browser:browser:1.8.0'
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:${rootProject.ext.has('androidxAppCompatVersion') ? rootProject.ext.androidxAppCompatVersion : '1.6.1'}"
    implementation "androidx.coordinatorlayout:coordinatorlayout:${rootProject.ext.has('androidxCoordinatorLayoutVersion') ? rootProject.ext.androidxCoordinatorLayoutVersion : '1.2.0'}"
    implementation "androidx.core:core-splashscreen:${rootProject.ext.has('coreSplashScreenVersion') ? rootProject.ext.coreSplashScreenVersion : '1.0.1'}"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:${rootProject.ext.has('junitVersion') ? rootProject.ext.junitVersion : '4.13.2'}"
    androidTestImplementation "androidx.test.ext:junit:${rootProject.ext.has('androidxJunitVersion') ? rootProject.ext.androidxJunitVersion : '1.1.5'}"
    androidTestImplementation "androidx.test.espresso:espresso-core:${rootProject.ext.has('androidxEspressoCoreVersion') ? rootProject.ext.androidxEspressoCoreVersion : '3.5.1'}"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
