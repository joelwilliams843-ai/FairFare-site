apply plugin: 'com.android.application'

// Defensive defaults - completely safe null handling
def sdkVersion = 35
def minSdk = 22
def targetSdk = 35

// Try to get values from variables.gradle if available
try {
    if (rootProject.ext.has('compileSdkVersion')) {
        sdkVersion = rootProject.ext.compileSdkVersion
    }
    if (rootProject.ext.has('minSdkVersion')) {
        minSdk = rootProject.ext.minSdkVersion
    }
    if (rootProject.ext.has('targetSdkVersion')) {
        targetSdk = rootProject.ext.targetSdkVersion
    }
} catch (Exception e) {
    logger.warn("Using default SDK versions: compileSdk=$sdkVersion, minSdk=$minSdk, targetSdk=$targetSdk")
}

// Keystore password with safe default
def keystorePassword = System.getenv("KEYSTORE_PASSWORD") ?: "placeholder"

android {
    namespace "com.tryfairfare.app"
    compileSdk sdkVersion
    
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }
    
    defaultConfig {
        applicationId "com.tryfairfare.app"
        minSdkVersion minSdk
        targetSdkVersion targetSdk
        versionCode 10
        versionName "1.0.10"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    
    signingConfigs {
        release {
            storeFile file('../fairfare-release-v2.keystore')
            storePassword keystorePassword
            keyAlias 'fairfare-release'
            keyPassword keystorePassword
        }
    }
    
    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
    }
    
    bundle {
        language {
            enableSplit = true
        }
        density {
            enableSplit = true
        }
        abi {
            enableSplit = true
        }
    }
}

// Force compatible version of androidx.browser (1.9.0 requires compileSdk 36)
configurations.all {
    resolutionStrategy {
        force 'androidx.browser:browser:1.8.0'
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

// Dependency versions with safe defaults
def appCompatVersion = '1.6.1'
def coordinatorLayoutVersion = '1.2.0'
def splashScreenVersion = '1.0.1'
def junitVer = '4.13.2'
def androidxJunitVer = '1.1.5'
def espressoVer = '3.5.1'

try {
    if (rootProject.ext.has('androidxAppCompatVersion')) appCompatVersion = rootProject.ext.androidxAppCompatVersion
    if (rootProject.ext.has('androidxCoordinatorLayoutVersion')) coordinatorLayoutVersion = rootProject.ext.androidxCoordinatorLayoutVersion
    if (rootProject.ext.has('coreSplashScreenVersion')) splashScreenVersion = rootProject.ext.coreSplashScreenVersion
    if (rootProject.ext.has('junitVersion')) junitVer = rootProject.ext.junitVersion
    if (rootProject.ext.has('androidxJunitVersion')) androidxJunitVer = rootProject.ext.androidxJunitVersion
    if (rootProject.ext.has('androidxEspressoCoreVersion')) espressoVer = rootProject.ext.androidxEspressoCoreVersion
} catch (Exception e) {
    logger.warn("Using default dependency versions")
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$appCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$coordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$splashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVer"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVer"
    androidTestImplementation "androidx.test.espresso:espresso-core:$espressoVer"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
