<svg width="2732" height="2732" viewBox="0 0 2732 2732" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628"/>
      <stop offset="100%" style="stop-color:#0D1F3C"/>
    </linearGradient>
    <linearGradient id="pathGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E6BFF"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1E6BFF"/>
      <stop offset="50%" style="stop-color:#4F8EFF"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
  </defs>
  
  <!-- Full background -->
  <rect width="2732" height="2732" fill="url(#bgGradient)"/>
  
  <!-- Centered icon (scaled and centered) -->
  <g transform="translate(1016, 1016)">
    <!-- Stylized F made of signal/path lines -->
    <path d="M140 40 L140 584" 
          stroke="url(#pathGradient)" 
          stroke-width="48" 
          stroke-linecap="round"
          fill="none"/>
    
    <path d="M140 72 Q312 72 420 72 Q500 72 500 140" 
          stroke="url(#accentGradient)" 
          stroke-width="48" 
          stroke-linecap="round"
          fill="none"/>
    
    <path d="M140 280 L360 280" 
          stroke="url(#accentGradient)" 
          stroke-width="42" 
          stroke-linecap="round"
          fill="none"/>
    
    <!-- Signal nodes -->
    <circle cx="380" cy="280" r="18" fill="#1E6BFF"/>
    <circle cx="430" cy="280" r="12" fill="#4F8EFF" opacity="0.8"/>
    <circle cx="470" cy="280" r="8" fill="#6366F1" opacity="0.6"/>
    
    <!-- Pulse rings -->
    <circle cx="140" cy="584" r="30" fill="none" stroke="#1E6BFF" stroke-width="2" opacity="0.3"/>
    <circle cx="140" cy="584" r="42" fill="none" stroke="#1E6BFF" stroke-width="1.5" opacity="0.15"/>
  </g>
  
  <!-- App name below icon -->
  <text x="1366" y="1750" 
        font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif" 
        font-size="72" 
        font-weight="600" 
        fill="#FFFFFF" 
        text-anchor="middle"
        letter-spacing="2">FairFare</text>
  
  <text x="1366" y="1820" 
        font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif" 
        font-size="32" 
        font-weight="400" 
        fill="rgba(255,255,255,0.5)" 
        text-anchor="middle"
        letter-spacing="1">Mobility Intelligence</text>
</svg>
