<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628"/>
      <stop offset="100%" style="stop-color:#0D1F3C"/>
    </linearGradient>
    <linearGradient id="pathGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E6BFF"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1E6BFF"/>
      <stop offset="50%" style="stop-color:#4F8EFF"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bgGradient)"/>
  
  <!-- Stylized F made of signal/path lines -->
  <!-- Main vertical stroke -->
  <path d="M340 240 L340 784" 
        stroke="url(#pathGradient)" 
        stroke-width="64" 
        stroke-linecap="round"
        fill="none"/>
  
  <!-- Top horizontal with curve (routing path feel) -->
  <path d="M340 272 Q512 272 620 272 Q700 272 700 340" 
        stroke="url(#accentGradient)" 
        stroke-width="64" 
        stroke-linecap="round"
        fill="none"/>
  
  <!-- Middle horizontal - signal line with nodes -->
  <path d="M340 480 L560 480" 
        stroke="url(#accentGradient)" 
        stroke-width="56" 
        stroke-linecap="round"
        fill="none"/>
  
  <!-- Signal nodes (intelligence indicators) -->
  <circle cx="580" cy="480" r="24" fill="#1E6BFF"/>
  <circle cx="650" cy="480" r="16" fill="#4F8EFF" opacity="0.8"/>
  <circle cx="700" cy="480" r="10" fill="#6366F1" opacity="0.6"/>
  
  <!-- Subtle pulse ring -->
  <circle cx="340" cy="784" r="40" fill="none" stroke="#1E6BFF" stroke-width="3" opacity="0.3"/>
  <circle cx="340" cy="784" r="56" fill="none" stroke="#1E6BFF" stroke-width="2" opacity="0.15"/>
</svg>
