services:
  - type: web
    name: fairfare-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "*"
