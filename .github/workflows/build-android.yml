name: Build Android AAB

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g., 1.0.0)'
        required: false
        default: '1.0'
      version_code:
        description: 'Version code (integer)'
        required: false
        default: '1'

jobs:
  build:
    name: Build Signed Release AAB
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install frontend dependencies
      working-directory: frontend
      run: yarn install
    
    - name: Build web app
      working-directory: frontend
      run: yarn build
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Clear Gradle caches
      run: |
        rm -rf ~/.gradle/caches/
        rm -rf frontend/android/.gradle/
    
    - name: Sync Capacitor to Android
      working-directory: frontend
      run: npx cap sync android
    
    - name: Patch Capacitor Android to fix null property bug
      working-directory: frontend
      run: |
        echo "Patching node_modules/@capacitor/android/capacitor/build.gradle..."
        cat > node_modules/@capacitor/android/capacitor/build.gradle << 'EOF'
        ext {
            androidxActivityVersion = '1.7.0'
            androidxAppCompatVersion = '1.6.1'
            androidxCoordinatorLayoutVersion = '1.2.0'
            androidxCoreVersion = '1.10.0'
            androidxFragmentVersion = '1.5.6'
            androidxWebkitVersion = '1.6.1'
            junitVersion = '4.13.2'
            androidxJunitVersion = '1.1.5'
            androidxEspressoCoreVersion = '3.5.1'
            cordovaAndroidVersion = '10.1.1'
        }
        buildscript {
            ext.kotlin_version = '1.8.20'
            repositories {
                google()
                mavenCentral()
            }
            dependencies {
                classpath 'com.android.tools.build:gradle:8.0.0'
            }
        }
        apply plugin: 'com.android.library'
        android {
            namespace "com.getcapacitor.android"
            compileSdk 33
            defaultConfig {
                minSdkVersion 22
                targetSdkVersion 33
                versionCode 1
                versionName "1.0"
                consumerProguardFiles "proguard-rules.pro"
            }
            buildTypes {
                release {
                    minifyEnabled false
                    proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
                }
            }
            lintOptions {
                abortOnError false
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
        }
        repositories {
            google()
            mavenCentral()
        }
        dependencies {
            implementation fileTree(dir: 'libs', include: ['*.jar'])
            implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
            implementation "androidx.core:core:$androidxCoreVersion"
            implementation "androidx.activity:activity:$androidxActivityVersion"
            implementation "androidx.fragment:fragment:$androidxFragmentVersion"
            implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
            implementation "androidx.webkit:webkit:$androidxWebkitVersion"
            testImplementation "junit:junit:$junitVersion"
            androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
            androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
            implementation 'com.google.code.gson:gson:2.10.1'
        }
        EOF
        echo "Patch applied!"
    
    - name: Remove cordova-android-plugins if regenerated
      working-directory: frontend/android
      run: |
        rm -rf capacitor-cordova-android-plugins
        # Fix settings.gradle if cap sync added it back
        echo "include ':app'" > settings.gradle
        echo "apply from: 'capacitor.settings.gradle'" >> settings.gradle
        echo "Settings.gradle fixed"
    
    - name: Verify keystore exists
      working-directory: frontend/android
      run: |
        ls -la fairfare-release-v2.keystore
        echo "Keystore file found"
    
    - name: Make gradlew executable
      working-directory: frontend/android
      run: chmod +x gradlew
    
    - name: Build Release AAB
      working-directory: frontend/android
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      run: ./gradlew bundleRelease --no-daemon --stacktrace
    
    - name: Upload app-release.aab
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: frontend/android/app/build/outputs/bundle/release/app-release.aab
        retention-days: 90
        if-no-files-found: error
