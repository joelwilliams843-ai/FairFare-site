name: Build Android AAB

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g., 1.0.0)'
        required: false
        default: '1.0'
      version_code:
        description: 'Version code (integer)'
        required: false
        default: '1'

jobs:
  build:
    name: Build Signed Release AAB
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install frontend dependencies
      working-directory: frontend
      run: yarn install
    
    - name: Build web app
      working-directory: frontend
      run: yarn build
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install Android SDK 35
      run: |
        sdkmanager --install "platforms;android-35" "build-tools;35.0.0"
        sdkmanager --list | grep -E "android-35|build-tools"
    
    - name: Clear Gradle caches
      run: |
        rm -rf ~/.gradle/caches/
        rm -rf ~/.gradle/wrapper/
        rm -rf frontend/android/.gradle/
        rm -rf frontend/android/app/build/
    
    - name: Sync Capacitor to Android
      working-directory: frontend
      run: npx cap sync android
    
    - name: Patch all Gradle files
      working-directory: frontend
      run: |
        # Patch Capacitor Android
        echo 'ext {' > node_modules/@capacitor/android/capacitor/build.gradle
        echo '    androidxActivityVersion = "1.7.0"' >> node_modules/@capacitor/android/capacitor/build.gradle
        echo '    androidxAppCompatVersion = "1.6.1"' >> node_modules/@capacitor/android/capacitor/build.gradle
        echo '    androidxCoordinatorLayoutVersion = "1.2.0"' >> node_modules/@capacitor/android/capacitor/build.gradle
        echo '    androidxCoreVersion = "1.10.0"' >> node_modules/@capacitor/android/capacitor/build.gradle
        echo '    androidxFragmentVersion = "1.5.6"' >> node_modules/@capacitor/android/capacitor/build.gradle
        echo '    androidxWebkitVersion = "1.6.1"' >> node_modules/@capacitor/android/capacitor/build.gradle
        echo '    junitVersion = "4.13.2"' >> node_modules/@capacitor/android/capacitor/build.gradle
        echo '    androidxJunitVersion = "1.1.5"' >> node_modules/@capacitor/android/capacitor/build.gradle
        echo '    androidxEspressoCoreVersion = "3.5.1"' >> node_modules/@capacitor/android/capacitor/build.gradle
        echo '    cordovaAndroidVersion = "10.1.1"' >> node_modules/@capacitor/android/capacitor/build.gradle
        echo '    kotlin_version = "1.8.20"' >> node_modules/@capacitor/android/capacitor/build.gradle
        echo '}' >> node_modules/@capacitor/android/capacitor/build.gradle
        echo 'buildscript {' >> node_modules/@capacitor/android/capacitor/build.gradle
        echo '    repositories { google(); mavenCentral() }' >> node_modules/@capacitor/android/capacitor/build.gradle
        echo '    dependencies { classpath "com.android.tools.build:gradle:8.2.2" }' >> node_modules/@capacitor/android/capacitor/build.gradle
        echo '}' >> node_modules/@capacitor/android/capacitor/build.gradle
        echo 'apply plugin: "com.android.library"' >> node_modules/@capacitor/android/capacitor/build.gradle
        echo 'android {' >> node_modules/@capacitor/android/capacitor/build.gradle
        echo '    namespace "com.getcapacitor.android"' >> node_modules/@capacitor/android/capacitor/build.gradle
        echo '    compileSdk 35' >> node_modules/@capacitor/android/capacitor/build.gradle
        echo '    defaultConfig { minSdkVersion 22; targetSdkVersion 35; versionCode 1; versionName "1.0"; consumerProguardFiles "proguard-rules.pro" }' >> node_modules/@capacitor/android/capacitor/build.gradle
        echo '    buildTypes { release { minifyEnabled false; proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro" } }' >> node_modules/@capacitor/android/capacitor/build.gradle
        echo '    lintOptions { abortOnError false }' >> node_modules/@capacitor/android/capacitor/build.gradle
        echo '    compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }' >> node_modules/@capacitor/android/capacitor/build.gradle
        echo '}' >> node_modules/@capacitor/android/capacitor/build.gradle
        echo 'repositories { google(); mavenCentral() }' >> node_modules/@capacitor/android/capacitor/build.gradle
        echo 'dependencies {' >> node_modules/@capacitor/android/capacitor/build.gradle
        echo '    implementation fileTree(dir: "libs", include: ["*.jar"])' >> node_modules/@capacitor/android/capacitor/build.gradle
        echo '    implementation platform("org.jetbrains.kotlin:kotlin-bom:$kotlin_version")' >> node_modules/@capacitor/android/capacitor/build.gradle
        echo '    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"' >> node_modules/@capacitor/android/capacitor/build.gradle
        echo '    implementation "androidx.core:core:$androidxCoreVersion"' >> node_modules/@capacitor/android/capacitor/build.gradle
        echo '    implementation "androidx.activity:activity:$androidxActivityVersion"' >> node_modules/@capacitor/android/capacitor/build.gradle
        echo '    implementation "androidx.fragment:fragment:$androidxFragmentVersion"' >> node_modules/@capacitor/android/capacitor/build.gradle
        echo '    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"' >> node_modules/@capacitor/android/capacitor/build.gradle
        echo '    implementation "androidx.webkit:webkit:$androidxWebkitVersion"' >> node_modules/@capacitor/android/capacitor/build.gradle
        echo '    testImplementation "junit:junit:$junitVersion"' >> node_modules/@capacitor/android/capacitor/build.gradle
        echo '    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"' >> node_modules/@capacitor/android/capacitor/build.gradle
        echo '    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"' >> node_modules/@capacitor/android/capacitor/build.gradle
        echo '    implementation "org.apache.cordova:framework:$cordovaAndroidVersion"' >> node_modules/@capacitor/android/capacitor/build.gradle
        echo '}' >> node_modules/@capacitor/android/capacitor/build.gradle
        echo "Capacitor Android patched!"
        
        # Patch cordova.variables.gradle
        echo 'ext { cdvMinSdkVersion = 22; cdvPluginPostBuildExtras = []; cordovaConfig = [:] }' > android/capacitor-cordova-android-plugins/cordova.variables.gradle
        echo "cordova.variables.gradle patched!"
        
        # Patch capacitor-cordova-android-plugins/build.gradle
        echo 'ext { androidxAppCompatVersion = "1.6.1"; cordovaAndroidVersion = "10.1.1" }' > android/capacitor-cordova-android-plugins/build.gradle
        echo 'buildscript { repositories { google(); mavenCentral() }; dependencies { classpath "com.android.tools.build:gradle:8.2.2" } }' >> android/capacitor-cordova-android-plugins/build.gradle
        echo 'apply plugin: "com.android.library"' >> android/capacitor-cordova-android-plugins/build.gradle
        echo 'android { namespace "capacitor.cordova.android.plugins"; compileSdk 35; defaultConfig { minSdkVersion 22; targetSdkVersion 35 }; lintOptions { abortOnError false }; compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 } }' >> android/capacitor-cordova-android-plugins/build.gradle
        echo 'repositories { google(); mavenCentral(); flatDir { dirs "src/main/libs", "libs" } }' >> android/capacitor-cordova-android-plugins/build.gradle
        echo 'dependencies { implementation fileTree(dir: "src/main/libs", include: ["*.jar"]); implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"; implementation "org.apache.cordova:framework:$cordovaAndroidVersion" }' >> android/capacitor-cordova-android-plugins/build.gradle
        echo 'apply from: "cordova.variables.gradle"' >> android/capacitor-cordova-android-plugins/build.gradle
        echo 'for (def func : cdvPluginPostBuildExtras) { func() }' >> android/capacitor-cordova-android-plugins/build.gradle
        echo "capacitor-cordova-android-plugins/build.gradle patched!"
    
    - name: Decode keystore from secret
      working-directory: frontend/android
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        echo "$KEYSTORE_BASE64" | base64 --decode > fairfare-upload.keystore
        ls -la fairfare-upload.keystore
    
    - name: Make gradlew executable
      working-directory: frontend/android
      run: chmod +x gradlew
    
    - name: Build Release AAB
      working-directory: frontend/android
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: ./gradlew bundleRelease --no-daemon --stacktrace
    
    - name: Build Release APK
      working-directory: frontend/android
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: ./gradlew assembleRelease --no-daemon --stacktrace
    
    - name: Upload app-release.aab
      uses: actions/upload-artifact@v4
      with:
        name: app-release-aab
        path: frontend/android/app/build/outputs/bundle/release/app-release.aab
        retention-days: 90
        if-no-files-found: error
    
    - name: Upload app-release.apk
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: frontend/android/app/build/outputs/apk/release/app-release.apk
        retention-days: 90
        if-no-files-found: error
