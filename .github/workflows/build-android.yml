name: Build Android AAB

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g., 1.0.0)'
        required: false
        default: '1.0'
      version_code:
        description: 'Version code (integer)'
        required: false
        default: '1'

jobs:
  build:
    name: Build Signed Release AAB
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install frontend dependencies
      working-directory: frontend
      run: yarn install
    
    - name: Build web app
      working-directory: frontend
      run: yarn build
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Clear Gradle caches
      run: |
        rm -rf ~/.gradle/caches/
        rm -rf frontend/android/.gradle/
    
    - name: Sync Capacitor to Android
      working-directory: frontend
      run: npx cap sync android
    
    - name: Patch Capacitor Android build.gradle
      working-directory: frontend
      run: |
        echo "Patching node_modules/@capacitor/android/capacitor/build.gradle..."
        cat > node_modules/@capacitor/android/capacitor/build.gradle << 'CAPEOF'
ext {
    androidxActivityVersion = '1.7.0'
    androidxAppCompatVersion = '1.6.1'
    androidxCoordinatorLayoutVersion = '1.2.0'
    androidxCoreVersion = '1.10.0'
    androidxFragmentVersion = '1.5.6'
    androidxWebkitVersion = '1.6.1'
    junitVersion = '4.13.2'
    androidxJunitVersion = '1.1.5'
    androidxEspressoCoreVersion = '3.5.1'
    cordovaAndroidVersion = '10.1.1'
    kotlin_version = '1.8.20'
}
buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.0.0'
    }
}
apply plugin: 'com.android.library'
android {
    namespace "com.getcapacitor.android"
    compileSdk 33
    defaultConfig {
        minSdkVersion 22
        targetSdkVersion 33
        versionCode 1
        versionName "1.0"
        consumerProguardFiles "proguard-rules.pro"
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
    lintOptions {
        abortOnError false
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
repositories {
    google()
    mavenCentral()
}
dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    implementation platform("org.jetbrains.kotlin:kotlin-bom:$kotlin_version")
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.core:core:$androidxCoreVersion"
    implementation "androidx.activity:activity:$androidxActivityVersion"
    implementation "androidx.fragment:fragment:$androidxFragmentVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.webkit:webkit:$androidxWebkitVersion"
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation "org.apache.cordova:framework:$cordovaAndroidVersion"
}
CAPEOF
        echo "Capacitor Android patched!"
    
    - name: Patch cordova plugin files
      working-directory: frontend/android
      run: |
        echo "Fixing cordova.variables.gradle..."
        cat > capacitor-cordova-android-plugins/cordova.variables.gradle << 'VARSEOF'
ext {
  cdvMinSdkVersion = 22
  cdvPluginPostBuildExtras = []
  cordovaConfig = [:]
}
VARSEOF
        
        echo "Fixing capacitor-cordova-android-plugins/build.gradle..."
        cat > capacitor-cordova-android-plugins/build.gradle << 'CORDOVAEOF'
ext {
    androidxAppCompatVersion = '1.6.1'
    cordovaAndroidVersion = '10.1.1'
}
buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.0.0'
    }
}
apply plugin: 'com.android.library'
android {
    namespace "capacitor.cordova.android.plugins"
    compileSdk 33
    defaultConfig {
        minSdkVersion 22
        targetSdkVersion 33
        versionCode 1
        versionName "1.0"
    }
    lintOptions {
        abortOnError false
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
repositories {
    google()
    mavenCentral()
    flatDir{
        dirs 'src/main/libs', 'libs'
    }
}
dependencies {
    implementation fileTree(dir: 'src/main/libs', include: ['*.jar'])
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "org.apache.cordova:framework:$cordovaAndroidVersion"
}
apply from: "cordova.variables.gradle"
for (def func : cdvPluginPostBuildExtras) {
    func()
}
CORDOVAEOF
        echo "Cordova plugin files fixed!"
    
    - name: Patch app build.gradle
      working-directory: frontend/android
      run: |
        cat > app/build.gradle << 'APPEOF'
apply plugin: 'com.android.application'
android {
    namespace "com.tryfairfare.app"
    compileSdkVersion rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.tryfairfare.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 10
        versionName "1.0.10"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            storeFile file('../fairfare-upload.keystore')
            storePassword System.getenv("KEYSTORE_PASSWORD") ?: "placeholder"
            keyAlias System.getenv("KEY_ALIAS") ?: "fairfare-upload"
            keyPassword System.getenv("KEY_PASSWORD") ?: System.getenv("KEYSTORE_PASSWORD") ?: "placeholder"
        }
    }
    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
    }
}
repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}
dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}
apply from: 'capacitor.build.gradle'
try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found")
}
APPEOF
        echo "app/build.gradle fixed!"
    
    - name: Decode keystore from secret
      working-directory: frontend/android
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        echo "$KEYSTORE_BASE64" | base64 --decode > fairfare-upload.keystore
        echo "Keystore decoded successfully"
        ls -la fairfare-upload.keystore
    
    - name: Make gradlew executable
      working-directory: frontend/android
      run: chmod +x gradlew
    
    - name: Build Release AAB
      working-directory: frontend/android
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: ./gradlew bundleRelease --no-daemon --stacktrace
    
    - name: Upload app-release.aab
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: frontend/android/app/build/outputs/bundle/release/app-release.aab
        retention-days: 90
        if-no-files-found: error
