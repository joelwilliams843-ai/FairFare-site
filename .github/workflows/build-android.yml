name: Build Android AAB

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g., 1.0.0)'
        required: false
        default: '1.0'
      version_code:
        description: 'Version code (integer)'
        required: false
        default: '1'

jobs:
  build:
    name: Build Signed Release AAB
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Verify Java version
      run: |
        java -version
        echo "JAVA_HOME=$JAVA_HOME"
    
    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install frontend dependencies
      working-directory: frontend
      run: yarn install
    
    - name: Build web app
      working-directory: frontend
      run: yarn build
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Sync Capacitor to Android
      working-directory: frontend
      run: npx cap sync android
    
    - name: Verify keystore exists
      working-directory: frontend/android
      run: |
        ls -la fairfare-release-v2.keystore
        echo "Keystore file found in repository"
    
    - name: Update version (if specified)
      if: github.event.inputs.version_name != '1.0' || github.event.inputs.version_code != '1'
      working-directory: frontend/android/app
      run: |
        sed -i "s/versionCode 1/versionCode ${{ github.event.inputs.version_code }}/" build.gradle
        sed -i "s/versionName \"1.0\"/versionName \"${{ github.event.inputs.version_name }}\"/" build.gradle
        echo "Updated to version ${{ github.event.inputs.version_name }} (code: ${{ github.event.inputs.version_code }})"
    
    - name: Make gradlew executable
      working-directory: frontend/android
      run: chmod +x gradlew
    
    - name: Build Release AAB
      working-directory: frontend/android
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      run: |
        echo "Using Java: $(java -version 2>&1 | head -1)"
        echo "JAVA_HOME: $JAVA_HOME"
        ./gradlew bundleRelease --no-daemon --stacktrace -Dorg.gradle.java.home=$JAVA_HOME
        echo "Build completed!"
    
    - name: Verify AAB artifact
      run: |
        ls -la frontend/android/app/build/outputs/bundle/release/
        echo "AAB file size:"
        du -h frontend/android/app/build/outputs/bundle/release/app-release.aab
    
    - name: Upload app-release.aab
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: frontend/android/app/build/outputs/bundle/release/app-release.aab
        retention-days: 90
        if-no-files-found: error
    
    - name: Build Summary
      run: |
        echo "## ✅ Android AAB Build Successful" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| **Package** | com.fairfare.app |" >> $GITHUB_STEP_SUMMARY
        echo "| **Version** | ${{ github.event.inputs.version_name || '1.0' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| **Version Code** | ${{ github.event.inputs.version_code || '1' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| **Build Type** | Release (signed) |" >> $GITHUB_STEP_SUMMARY
        echo "| **Artifact** | app-release.aab |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "📦 Download from **Artifacts** section below." >> $GITHUB_STEP_SUMMARY
