name: Build Android AAB

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g., 1.0.0)'
        required: false
        default: '1.0'
      version_code:
        description: 'Version code (integer)'
        required: false
        default: '1'

jobs:
  build:
    name: Build Signed Release AAB
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Verify Java version
      run: |
        java -version
        echo "JAVA_HOME=$JAVA_HOME"
    
    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install frontend dependencies
      working-directory: frontend
      run: yarn install
    
    - name: Build web app
      working-directory: frontend
      run: yarn build
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Clear Gradle caches
      run: |
        rm -rf ~/.gradle/caches/
        rm -rf frontend/android/.gradle/
    
    - name: Sync Capacitor to Android
      working-directory: frontend
      run: npx cap sync android
    
    - name: Patch Capacitor files to fix null property bug
      working-directory: frontend
      run: |
        echo "Patching Capacitor Android build.gradle..."
        cat > node_modules/@capacitor/android/capacitor/build.gradle << 'EOF'
ext {
    androidxActivityVersion = '1.7.0'
    androidxAppCompatVersion = '1.6.1'
    androidxCoordinatorLayoutVersion = '1.2.0'
    androidxCoreVersion = '1.10.0'
    androidxFragmentVersion = '1.5.6'
    androidxWebkitVersion = '1.6.1'
    junitVersion = '4.13.2'
    androidxJunitVersion = '1.1.5'
    androidxEspressoCoreVersion = '3.5.1'
    cordovaAndroidVersion = '10.1.1'
}

buildscript {
    ext.kotlin_version = '1.8.20'
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.0.0'
    }
}

apply plugin: 'com.android.library'

android {
    namespace "com.getcapacitor.android"
    compileSdk 33
    defaultConfig {
        minSdkVersion 22
        targetSdkVersion 33
        versionCode 1
        versionName "1.0"
        consumerProguardFiles "proguard-rules.pro"
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
    lintOptions {
        abortOnError false
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

repositories {
    google()
    mavenCentral()
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.core:core:$androidxCoreVersion"
    implementation "androidx.activity:activity:$androidxActivityVersion"
    implementation "androidx.fragment:fragment:$androidxFragmentVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.webkit:webkit:$androidxWebkitVersion"
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation 'com.google.code.gson:gson:2.10.1'
}
EOF
        
        echo "Patching capacitor-cordova-android-plugins build.gradle..."
        cat > android/capacitor-cordova-android-plugins/build.gradle << 'EOF'
ext {
    androidxAppCompatVersion = '1.6.1'
    cordovaAndroidVersion = '10.1.1'
}

buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.0.0'
    }
}

apply plugin: 'com.android.library'

android {
    namespace "capacitor.cordova.android.plugins"
    compileSdk 33
    defaultConfig {
        minSdkVersion 22
        targetSdkVersion 33
        versionCode 1
        versionName "1.0"
    }
    lintOptions {
        abortOnError false
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

repositories {
    google()
    mavenCentral()
    flatDir{
        dirs 'src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(dir: 'src/main/libs', include: ['*.jar'])
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "org.apache.cordova:framework:$cordovaAndroidVersion"
}

apply from: "cordova.variables.gradle"

for (def func : cdvPluginPostBuildExtras) {
    func()
}
EOF
        
        echo "Patching cordova.variables.gradle..."
        cat > android/capacitor-cordova-android-plugins/cordova.variables.gradle << 'EOF'
ext {
    cdvMinSdkVersion = 22
    cdvPluginPostBuildExtras = []
    cordovaConfig = [:]
}
EOF
        
        echo "All patches applied!"
    
    - name: Verify keystore exists
      working-directory: frontend/android
      run: |
        ls -la fairfare-release-v2.keystore
        echo "Keystore file found in repository"
    
    - name: Make gradlew executable
      working-directory: frontend/android
      run: chmod +x gradlew
    
    - name: Build Release AAB
      working-directory: frontend/android
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      run: |
        echo "Using Java: $(java -version 2>&1 | head -1)"
        ./gradlew bundleRelease --no-daemon --stacktrace
        echo "Build completed!"
    
    - name: Verify AAB artifact
      run: |
        ls -la frontend/android/app/build/outputs/bundle/release/
        echo "AAB file size:"
        du -h frontend/android/app/build/outputs/bundle/release/app-release.aab
    
    - name: Upload app-release.aab
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: frontend/android/app/build/outputs/bundle/release/app-release.aab
        retention-days: 90
        if-no-files-found: error
    
    - name: Build Summary
      run: |
        echo "## ✅ Android AAB Build Successful" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| **Package** | com.tryfairfare.app |" >> $GITHUB_STEP_SUMMARY
        echo "| **Version** | ${{ github.event.inputs.version_name || '1.0' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| **Version Code** | ${{ github.event.inputs.version_code || '1' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| **Build Type** | Release (signed) |" >> $GITHUB_STEP_SUMMARY
        echo "| **Artifact** | app-release.aab |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "📦 Download from **Artifacts** section below." >> $GITHUB_STEP_SUMMARY
