name: Build Android AAB

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g., 1.0.0)'
        required: false
        default: '1.0'
      version_code:
        description: 'Version code (integer)'
        required: false
        default: '1'

jobs:
  build:
    name: Build Signed Release AAB
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Verify Java version
      run: |
        java -version
        echo "JAVA_HOME=$JAVA_HOME"
    
    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install frontend dependencies
      working-directory: frontend
      run: yarn install
    
    - name: Build web app
      working-directory: frontend
      run: yarn build
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Clear Gradle caches
      run: |
        rm -rf ~/.gradle/caches/
        rm -rf frontend/android/.gradle/
    
    - name: Sync Capacitor to Android
      working-directory: frontend
      run: npx cap sync android
    
    - name: Debug - Print Capacitor Android build.gradle
      working-directory: frontend
      run: |
        echo "=== Capacitor Android build.gradle (lines 1-30) ==="
        head -30 node_modules/@capacitor/android/capacitor/build.gradle
        echo ""
        echo "=== app/build.gradle (lines 1-20) ==="
        head -20 android/app/build.gradle
        echo ""
        echo "=== Root build.gradle ==="
        cat android/build.gradle
    
    - name: Patch Capacitor Android build.gradle to fix null property issue
      working-directory: frontend
      run: |
        CAPACITOR_BUILD_GRADLE="node_modules/@capacitor/android/capacitor/build.gradle"
        echo "Patching $CAPACITOR_BUILD_GRADLE to use safe defaults..."
        
        # Replace the problematic ext block with safe hardcoded defaults
        cat > "$CAPACITOR_BUILD_GRADLE" << 'GRADLE_EOF'
ext {
    androidxActivityVersion = '1.8.0'
    androidxAppCompatVersion = '1.6.1'
    androidxCoordinatorLayoutVersion = '1.2.0'
    androidxCoreVersion = '1.12.0'
    androidxFragmentVersion = '1.6.2'
    androidxWebkitVersion = '1.9.0'
    junitVersion = '4.13.2'
    androidxJunitVersion = '1.1.5'
    androidxEspressoCoreVersion = '3.5.1'
    cordovaAndroidVersion = '10.1.1'
}

buildscript {
    ext.kotlin_version = '1.9.10'
    repositories {
        google()
        mavenCentral()
        maven {
            url "https://plugins.gradle.org/m2/"
        }
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.2.1'
    }
}

apply plugin: 'com.android.library'

android {
    namespace "com.getcapacitor.android"
    compileSdk project.hasProperty('compileSdkVersion') ? rootProject.ext.compileSdkVersion : 35
    defaultConfig {
        minSdkVersion project.hasProperty('minSdkVersion') ? rootProject.ext.minSdkVersion : 22
        targetSdkVersion project.hasProperty('targetSdkVersion') ? rootProject.ext.targetSdkVersion : 35
        versionCode 1
        versionName "1.0"
        consumerProguardFiles "proguard-rules.pro"
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
    lintOptions {
        abortOnError false
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

repositories {
    google()
    mavenCentral()
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.core:core:$androidxCoreVersion"
    implementation "androidx.activity:activity:$androidxActivityVersion"
    implementation "androidx.fragment:fragment:$androidxFragmentVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.webkit:webkit:$androidxWebkitVersion"
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation 'com.google.code.gson:gson:2.10.1'
}
GRADLE_EOF
        
        echo "Patch applied. New contents:"
        head -20 "$CAPACITOR_BUILD_GRADLE"
    
    - name: Verify keystore exists
      working-directory: frontend/android
      run: |
        ls -la fairfare-release-v2.keystore
        echo "Keystore file found in repository"
    
    - name: Update version (if specified)
      if: github.event.inputs.version_name != '1.0' || github.event.inputs.version_code != '1'
      working-directory: frontend/android/app
      run: |
        sed -i "s/versionCode 1/versionCode ${{ github.event.inputs.version_code }}/" build.gradle
        sed -i "s/versionName \"1.0\"/versionName \"${{ github.event.inputs.version_name }}\"/" build.gradle
        echo "Updated to version ${{ github.event.inputs.version_name }} (code: ${{ github.event.inputs.version_code }})"
    
    - name: Make gradlew executable
      working-directory: frontend/android
      run: chmod +x gradlew
    
    - name: Build Release AAB
      working-directory: frontend/android
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      run: |
        echo "Using Java: $(java -version 2>&1 | head -1)"
        echo "JAVA_HOME: $JAVA_HOME"
        ./gradlew bundleRelease --no-daemon --stacktrace
        echo "Build completed!"
    
    - name: Verify AAB artifact
      run: |
        ls -la frontend/android/app/build/outputs/bundle/release/
        echo "AAB file size:"
        du -h frontend/android/app/build/outputs/bundle/release/app-release.aab
    
    - name: Upload app-release.aab
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: frontend/android/app/build/outputs/bundle/release/app-release.aab
        retention-days: 90
        if-no-files-found: error
    
    - name: Build Summary
      run: |
        echo "## ✅ Android AAB Build Successful" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| **Package** | com.fairfare.app |" >> $GITHUB_STEP_SUMMARY
        echo "| **Version** | ${{ github.event.inputs.version_name || '1.0' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| **Version Code** | ${{ github.event.inputs.version_code || '1' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| **Build Type** | Release (signed) |" >> $GITHUB_STEP_SUMMARY
        echo "| **Artifact** | app-release.aab |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "📦 Download from **Artifacts** section below." >> $GITHUB_STEP_SUMMARY
