name: Build iOS IPA

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g., 1.0.32)'
        required: false
        default: '1.0.32'
      build_number:
        description: 'Build number (integer)'
        required: false
        default: '32'

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest
    
    env:
      ARCHIVE_PATH: ${{ github.workspace }}/build/FairFare.xcarchive
      EXPORT_PATH: ${{ github.workspace }}/build
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install frontend dependencies
      working-directory: frontend
      run: yarn install
    
    - name: Build web app
      working-directory: frontend
      env:
        REACT_APP_BACKEND_URL: https://fairfare-api.onrender.com
      run: yarn build
    
    - name: Sync Capacitor to iOS
      working-directory: frontend
      run: npx cap sync ios
    
    - name: Install CocoaPods dependencies
      working-directory: frontend/ios/App
      run: pod install
    
    - name: Update version numbers
      working-directory: frontend/ios/App
      run: |
        /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ github.event.inputs.version_name }}" App/Info.plist
        /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.event.inputs.build_number }}" App/Info.plist
        echo "Version set to ${{ github.event.inputs.version_name }} (${{ github.event.inputs.build_number }})"
    
    - name: Import Code Signing Certificate
      env:
        CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
        CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      run: |
        KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
        security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        
        CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
        echo -n "$CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
        security import $CERTIFICATE_PATH -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
        security list-keychain -d user -s $KEYCHAIN_PATH
    
    - name: Install Provisioning Profile
      env:
        PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
      run: |
        PP_PATH=$RUNNER_TEMP/profile.mobileprovision
        echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PP_PATH
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/
    
    - name: Create build directory
      run: mkdir -p ${{ env.EXPORT_PATH }}
    
    - name: Build iOS Archive
      working-directory: frontend/ios/App
      run: |
        xcodebuild -workspace App.xcworkspace \
          -scheme App \
          -sdk iphoneos \
          -configuration Release \
          -archivePath "${{ env.ARCHIVE_PATH }}" \
          archive \
          DEVELOPMENT_TEAM=D454QMYLJ7
        
        echo "Archive created at: ${{ env.ARCHIVE_PATH }}"
        ls -la "${{ env.ARCHIVE_PATH }}" || echo "Archive not found!"
    
    - name: Export IPA
      run: |
        cat > ${{ env.EXPORT_PATH }}/ExportOptions.plist << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>D454QMYLJ7</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
        </dict>
        </plist>
        EOF
        
        xcodebuild -exportArchive \
          -archivePath "${{ env.ARCHIVE_PATH }}" \
          -exportOptionsPlist "${{ env.EXPORT_PATH }}/ExportOptions.plist" \
          -exportPath "${{ env.EXPORT_PATH }}"
        
        ls -la "${{ env.EXPORT_PATH }}"
    
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: fairfare-ios-ipa
        path: ${{ env.EXPORT_PATH }}/*.ipa
        retention-days: 90
        if-no-files-found: error
