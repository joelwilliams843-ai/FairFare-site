name: Build iOS IPA

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g., 1.0.32)'
        required: false
        default: '1.0.32'
      build_number:
        description: 'Build number (integer)'
        required: false
        default: '32'

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest
    
    env:
      ARCHIVE_PATH: ${{ github.workspace }}/build/FairFare.xcarchive
      EXPORT_PATH: ${{ github.workspace }}/build
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install frontend dependencies
      working-directory: frontend
      run: yarn install
    
    - name: Build web app
      working-directory: frontend
      env:
        REACT_APP_BACKEND_URL: https://fairfare-api.onrender.com
      run: yarn build
    
    - name: Sync Capacitor to iOS
      working-directory: frontend
      run: npx cap sync ios
    
    - name: Install CocoaPods dependencies
      working-directory: frontend/ios/App
      run: pod install
    
    - name: Update version numbers
      working-directory: frontend/ios/App
      run: |
        /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ github.event.inputs.version_name }}" App/Info.plist
        /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.event.inputs.build_number }}" App/Info.plist
        echo "Version set to ${{ github.event.inputs.version_name }} (${{ github.event.inputs.build_number }})"
    
    - name: Import Code Signing Certificate
      env:
        CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
        CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      run: |
        # Create and configure keychain
        KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
        security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        
        # Import certificate
        CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
        echo -n "$CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
        security import $CERTIFICATE_PATH -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
        
        # Set keychain as default and allow codesign access
        security list-keychain -d user -s $KEYCHAIN_PATH
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        
        # Export keychain path for later steps
        echo "KEYCHAIN_PATH=${KEYCHAIN_PATH}" >> $GITHUB_ENV
    
    - name: Install Provisioning Profile
      env:
        PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
      run: |
        # Decode provisioning profile
        echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > profile.mobileprovision
        
        # Create profiles directory
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        
        # Extract UUID from provisioning profile
        PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i profile.mobileprovision))
        echo "Profile UUID: $PROFILE_UUID"
        
        # Copy with UUID as filename (REQUIRED by Xcode)
        cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision
        
        # Verify installation
        echo "Installed provisioning profiles:"
        ls -la ~/Library/MobileDevice/Provisioning\ Profiles/
        
        # Export UUID for use in later steps
        echo "PROFILE_UUID=${PROFILE_UUID}" >> $GITHUB_ENV
    
    - name: Create build directory
      run: mkdir -p ${{ env.EXPORT_PATH }}
    
    - name: Configure Code Signing
      working-directory: frontend/ios/App
      run: |
        # Install xcodeproj gem
        gem install xcodeproj
        
        # Configure signing for App target only, disable for Pods
        ruby << 'RUBY_SCRIPT'
        require 'xcodeproj'
        
        # 1. Disable signing for ALL Pods targets
        pods_project = Xcodeproj::Project.open('Pods/Pods.xcodeproj')
        pods_project.targets.each do |target|
          target.build_configurations.each do |config|
            config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
            config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
            config.build_settings['CODE_SIGN_IDENTITY'] = ''
            config.build_settings['CODE_SIGN_STYLE'] = 'Automatic'
            config.build_settings.delete('PROVISIONING_PROFILE_SPECIFIER')
            config.build_settings.delete('PROVISIONING_PROFILE')
          end
        end
        pods_project.save
        puts "✓ Disabled signing for #{pods_project.targets.count} Pod targets"
        
        # 2. Configure manual signing for App target only
        app_project = Xcodeproj::Project.open('App.xcodeproj')
        app_target = app_project.targets.find { |t| t.name == 'App' }
        
        if app_target
          app_target.build_configurations.each do |config|
            config.build_settings['CODE_SIGN_STYLE'] = 'Manual'
            config.build_settings['CODE_SIGN_IDENTITY'] = 'Apple Distribution'
            config.build_settings['DEVELOPMENT_TEAM'] = 'D454QMYLJ7'
            config.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = 'FairFare App Store Profile'
            config.build_settings['PRODUCT_BUNDLE_IDENTIFIER'] = 'com.tryfairfare.app'
          end
          app_project.save
          puts "✓ Configured manual signing for App target"
        else
          puts "✗ App target not found!"
          exit 1
        end
        RUBY_SCRIPT

    - name: Build iOS Archive
      working-directory: frontend/ios/App
      env:
        KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      run: |
        # Unlock keychain before build
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        
        xcodebuild -workspace App.xcworkspace \
          -scheme App \
          -sdk iphoneos \
          -configuration Release \
          -archivePath "${{ env.ARCHIVE_PATH }}" \
          archive \
          -allowProvisioningUpdates
        
        echo "Archive created at: ${{ env.ARCHIVE_PATH }}"
        ls -la "${{ env.ARCHIVE_PATH }}"

    - name: Export IPA
      env:
        KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      run: |
        # Unlock keychain before export
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        
        # Create ExportOptions.plist with provisioningProfiles dict
        cat > ${{ env.EXPORT_PATH }}/ExportOptions.plist << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>D454QMYLJ7</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
                <key>com.tryfairfare.app</key>
                <string>FairFare App Store Profile</string>
            </dict>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
        </dict>
        </plist>
        EOF
        
        echo "ExportOptions.plist contents:"
        cat ${{ env.EXPORT_PATH }}/ExportOptions.plist
        
        xcodebuild -exportArchive \
          -archivePath "${{ env.ARCHIVE_PATH }}" \
          -exportOptionsPlist "${{ env.EXPORT_PATH }}/ExportOptions.plist" \
          -exportPath "${{ env.EXPORT_PATH }}"
        
        echo "Export completed. Contents:"
        ls -la "${{ env.EXPORT_PATH }}"

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: fairfare-ios-ipa
        path: ${{ env.EXPORT_PATH }}/*.ipa
        retention-days: 90
        if-no-files-found: error
